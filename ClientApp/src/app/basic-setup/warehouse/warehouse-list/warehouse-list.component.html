<section class="content">
  <div class="container-fluid">
    <div class="block-header">
      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <ul class="breadcrumb breadcrumb-style ">
            <li class="breadcrumb-item">
              <h4 class="page-title">Warehouse</h4>
            </li>
            <li class="breadcrumb-item bcrumb-1">
              <a routerLink="/admin/dashboard/main">
                <i class="fas fa-home"></i> </a>
            </li>
            <li class="breadcrumb-item bcrumb-2">
              <a href="#" onClick="return false;">Warehouse</a>
            </li>
            <li class="breadcrumb-item active">All </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
          <div class="body">
            <div class="responsive_table">
              <div class="materialTableHeader">
                <div class="row">
                  <div class="col-8">
                    <ul class="header-buttons-left ml-0">
                      <li class="dropdown">
                        <h2>
                          <strong></strong>
                        </h2>
                      </li>

                      <li class="dropdown">
                        <input placeholder="Search" type="text" [(ngModel)]="searchText" #filter
                          class="browser-default search-field" aria-label="Search box">
                      </li>
                      <li>
                        <div class="icon-button-demo m-l-10">
                          <button mat-mini-fab color="accent" (click)="applyFilter(searchText)">
                            <mat-icon class="col-white">search</mat-icon>
                          </button>
                        </div>
                      </li>
                    </ul>
                  </div>
                  <div class="col-4">
                    <ul class="header-buttons">
                      <li>
                        <div class="icon-button-demo">
                          <button *ngIf="this.permission.add" class="btn-space" mat-raised-button color="primary"
                            routerLink="/basic-setup/add-warehouse">Add
                            <mat-icon class="col-white">add</mat-icon>
                          </button>
                        </div>
                      </li>
                      <li>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <table class="table tbl-by-group db-li-s-in">
                <thead>
                  <tr>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Ser.</h5>
                    </th>
                    <th class="accession-no">
                      <h5 style="text-align: center;">Operational Sites </h5>
                    </th>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Site Address</h5>
                    </th>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Contact Person</h5>
                    </th>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Mobile No</h5>
                    </th>
                    <th class="accession-no">
                      <h5 style="text-align: center;">Cash in Hand </h5>
                    </th>
                    <!-- <th class="booktitle-issue">
                      <h5 style="text-align: center;">Is Website?</h5>
                    </th> -->
                    <!-- <th class="booktitle-issue">
                      <h5 style="text-align: center;">Is e-Shop?</h5>
                    </th> -->
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Logo</h5>
                    </th>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;">Image</h5>
                    </th>
                    <th class="cl-mrk">
                      <h5 style="text-align: center;"> Actions</h5>
                    </th>
                  </tr>
                </thead>
                <tbody>

                  <ng-container *ngFor="let number of this.dataSource.data; let i = index">

                    <tr>
                      <td>{{ i+1}}</td>
                      <td style="text-align: left;">{{ number.warehouseName}}</td>
                      <td style="text-align: left;">{{ number.warehouseAddress}}</td>
                      <td>{{ number.contactPerson}}</td>
                      <td>{{ number.contactNo}}</td>
                      <td>{{ number.cashAmount}}</td>
                      <!-- <td>
                        <span [style.color]="number.isWebsite ? 'green' : 'red'">
                          {{ number.isWebsite ? 'YES' : 'NO' }}
                        </span>
                      </td> -->
                      <!-- <td>
                        <span [style.color]="number.isEshop ? 'green' : 'red'">
                          {{ number.isEshop ? 'YES' : 'NO' }}
                        </span>
                      </td> -->
                      <td class="table-img img-on-hover">
                        <ng-container
                          *ngIf="number.businessImages && number.businessImages !== 'files/business-units/'; else noImage">
                          <img [src]="getEmployeeImage(number.businessImages)" style="width: 60px; height: 60px;" />
                          <div class="pop-on-hover">
                            <img [src]="getEmployeeImage(number.businessImages)" />
                          </div>
                        </ng-container>
                        <ng-template #noImage>
                          <div
                            style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background-color: #f0f0f0; color: #666; font-size: 12px; border: 1px solid #ccc;">
                            No Image
                          </div>
                        </ng-template>
                      </td>
                      <td class="table-img img-on-hover">
                        <ng-container
                          *ngIf="number.productImages && number.productImages !== 'files/business-units/'; else noImage">
                          <img [src]="getEmployeeImage(number.productImages)" style="width: 60px; height: 60px;" />
                          <div class="pop-on-hover">
                            <img [src]="getEmployeeImage(number.productImages)" />
                          </div>
                        </ng-container>
                        <ng-template #noImage>
                          <div
                            style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background-color: #f0f0f0; color: #666; font-size: 12px; border: 1px solid #ccc;">
                            No Image
                          </div>
                        </ng-template>
                      </td>
                      <td>
                        <button *ngIf="this.permission.update" mat-icon-button color="accent" class="btn-tbl-edit"
                          [routerLink]="['/basic-setup/update-warehouse', number.warehouseId]">
                          <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                        </button>
                        <button *ngIf="this.permission.delete" mat-icon-button color="accent" class="btn-tbl-delete"
                          (click)="$event.stopPropagation()" (click)="deleteItem(number)">
                          <mat-icon aria-label="Delete" class="col-white">delete</mat-icon>
                        </button>
                      </td>
                    </tr>
                  </ng-container>
                </tbody>
              </table>

              <mat-paginator [length]="paging.length" [showFirstLastButtons]="masterData.paging.showFirstLastButtons"
                [pageSize]="paging.pageSize" [pageSizeOptions]="masterData.paging.pageSizeOptions"
                (page)="pageChanged($event)">
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
