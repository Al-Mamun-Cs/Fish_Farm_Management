<section class="content">
  <div class="container-fluid">
    <div class="block-header">
      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <ul class="breadcrumb breadcrumb-style text-end text-md-start justify-content-end justify-content-md-start">
            <li class="breadcrumb-item">
              <!-- <h4 class="page-title">Stock Out  </h4> -->
            </li>
            <li class="breadcrumb-item bcrumb-1">
              <a routerLink="/admin/dashboard/main">
                <i class="fas fa-home"></i> </a>
            </li>
            <li class="breadcrumb-item bcrumb-2">
              <a href="#" onClick="return false;">আর্থিক কার্যক্রম </a>
            </li>
            <li class="breadcrumb-item active">All </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
          <div class="body">
            <div class="responsive_table">
              <div class="materialTableHeader">
                <div class="row">
                  <div class="col-8">
                    <ul class="header-buttons-left ml-0">
                      <li class="dropdown">
                        <h2>
                          <strong></strong>
                        </h2>
                      </li>

                      <li class="dropdown">
                        <input placeholder="Search" type="text" [(ngModel)]="searchText" #filter
                          class="browser-default search-field" aria-label="Search box">
                      </li>
                      <li>
                        <div class="icon-button-demo m-l-10">
                          <button mat-mini-fab color="accent" (click)="applyFilter(searchText)">
                            <mat-icon class="col-white">search</mat-icon>
                          </button>
                        </div>
                      </li>
                    </ul>
                  </div>
                  <div class="col-4">
                    <ul class="header-buttons">
                      <li>
                        <div class="icon-button-demo">
                          <button *ngIf="this.permission.add" class="btn-space" mat-raised-button color="primary"
                            routerLink="/financial-transactions/add-dailymiscellaneouscost">Add
                            <mat-icon class="col-white">add</mat-icon>
                          </button>
                        </div>
                      </li>
                      <li>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <div id="print-routine">
                <table class="table tbl-by-group db-li-s-in">
                  <thead>
                    <tr>
                      <th class="cl-pdate" style="width: 5%;">
                        <h5 style="text-align: center;"> ক্র: নং </h5>
                      </th>
                      <th *ngIf="this.role === 'Super Admin'" class="cl-mrk">
                        <h5 style="text-align: center;">Warehouse</h5>
                      </th>
                      <th class="cl-pdate" style="width: 20%;">
                        <h5 style="text-align: center;"> খরচের কারণ  </h5>
                      </th>
                      <th class="cl-mrk" style="width: 20%;">
                        <h5 style="text-align: center;"> পেমেন্টের ধরন</h5>
                      </th>
                      <th class="cl-mrk" style="width: 10%;">
                        <h5 style="text-align: center;"> তারিখ</h5>
                      </th>


                      <th class="cl-mrk" style="width: 10%;">
                        <h5 style="text-align: center;">টাকার পরিমাণ</h5>
                      </th>

                      <th class="cl-mrk" style="width: 10%;">
                        <h5 style="text-align: center;"> মন্তব্য</h5>
                      </th>


                      <th class="cl-mrk" style="width: 5%;">
                        <h5 style="text-align: center;"> Actions</h5>
                      </th>
                    </tr>
                  </thead>
                  <tbody>

                    <ng-container *ngFor="let number of this.dataSource.data; let i = index">
                      <tr>
                        <td>{{ i+1}}</td>
                        <td *ngIf="this.role === 'Super Admin'">{{ number.warehouse}}</td>
                        <td>{{ number.dailyCostReason }}</td>
                        <td>{{ number.paymentStatus }}</td>
                        <td>{{ number.transactionDate | date: 'dd-MM-yyyy'}}</td>
                        <td>{{ number.amount | number:'1.2-2'}}</td>
                        <td>{{ number.remarks }}</td>

                        <td>
                          <!-- <button *ngIf="this.permission.update" mat-icon-button color="accent" class="btn-tbl-edit"
                            [routerLink]="['/financial-transactions/update-dailymiscellaneouscost', number.dailyMiscellaneousCostId]">
                            <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                          </button> -->

                          <button *ngIf="this.permission.delete" mat-icon-button color="accent" class="btn-tbl-delete"
                            (click)="$event.stopPropagation()" (click)="deleteItem(number)">
                            <mat-icon aria-label="Delete" class="col-white">delete</mat-icon>
                          </button>
                        </td>
                      </tr>
                    </ng-container>
                  </tbody>
                </table>
              </div>


              <mat-paginator [length]="paging.length" [showFirstLastButtons]="masterData.paging.showFirstLastButtons"
                [pageSize]="paging.pageSize" [pageSizeOptions]="masterData.paging.pageSizeOptions"
                (page)="pageChanged($event)">
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
